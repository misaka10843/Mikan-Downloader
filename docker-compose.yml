version: '3.8'
services:
  mikan-downloader:
    build: .
    container_name: mikan-downloader
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./history.db:/app/history.db  # 数据库文件持久化
      - ./downloads:/app/downloads    # 下载主目录映射
      - ./torrents:/app/torrents      # 种子缓存目录映射
    environment:
      - TZ=Asia/Shanghai
      - PYTHONPATH=/app/src           # 确保代码路径正确

  aria2:
    image: p3terx/aria2-pro
    container_name: aria2
    restart: unless-stopped
    ports:
      - "6800:6800"
      - "6888:6888"
      - "6888:6888/udp"
    volumes:
      - ./aria2-config:/config
      - ./downloads:/downloads  # 注意与 mikan-downloader 中 volumes 一致
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Shanghai
      - RPC_SECRET=YOUR_SECRET_CODE
